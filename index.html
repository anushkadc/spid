<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4SPID</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/headLogo_circle.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/headLogo_circle.png">
  <link rel="mask-icon" href="images/headLogo_circle.svg" color="#000000">
  <link rel="apple-touch-icon" sizes="180x180" href="images/headLogo_circle.png">
  <link rel="shortcut icon" href="images/headLogo_circle.ico" type="image/x-icon">

  <!--
    REMOVED: Bootstrap CSS — it was unused on this page.
    REMOVED: Google Fonts network request — using system font stack below
             until the custom font loads, so text appears instantly.
    ADDED:   font-display: swap so text never stays invisible waiting for font.
  -->
  <style>
    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* System font shows instantly; Saira swaps in once loaded */
    @font-face {
      font-family: 'Saira';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap; /* ← text visible immediately, font swaps in */
      src: url('https://fonts.gstatic.com/s/saira/v20/memWYa2wxmKQyPMrZX79wwYZQMhsyuShhKMjjbU9uXuA71rDosg7lwYmUVY.woff2') format('woff2');
    }

    body, html {
      height: 100%;
      font-family: 'Saira', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Video background ── */
    .video-background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      overflow: hidden;

      /* Fallback color shown instantly while video loads */
      background-color: #183B4E;
    }

    .video-background video {
      width: 100%; height: 100%;
      object-fit: cover;
      /* Fade video in once it's ready — prevents white flash */
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .video-background video.loaded {
      opacity: 1;
    }

    /* ── Gradient overlay ── */
    .video-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to right, #E52020, #FBA518, #7E1891, #A6F1E0);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: -1;
      opacity: 0.8;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Hero ── */
    .hero-section {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 30px;
      z-index: 1;
    }

    /* Title visible immediately — no waiting */
    .hero-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      max-width: 800px;
      min-height: 3.5rem; /* reserve space so layout doesn't jump */
    }

    /* Blinking cursor while typing */
    .hero-title::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
      margin-left: 2px;
    }

    .hero-title.done::after {
      display: none; /* hide cursor when typing finishes */
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .hero-tagline {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 2rem;
      max-width: 700px;
      line-height: 1.6;
      /* Fade in after title types out */
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .hero-tagline.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .explore-btn {
      background: #fff;
      color: #183B4E;
      border: none;
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      margin: 20px;
      /* Same fade-in as tagline */
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s, background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }

    .explore-btn.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .explore-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      color: #fff;
      background: #183B4E;
    }

    @media (max-width: 768px) {
      .hero-title   { font-size: 2rem; }
      .hero-tagline { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Background Video
       preload="none"  → don't block page load; JS triggers load after DOM ready
       playsinline     → required for autoplay on iOS
  -->
  <div class="video-background">
    <video id="bgVideo" muted loop playsinline preload="none">
      <source src="videos/explore_bg.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Gradient overlay (visible instantly as fallback) -->
  <div class="video-overlay"></div>

  <!-- Hero content -->
  <section class="hero-section">
    <h1 class="hero-title" id="intro" aria-label="Design. Print. Deliver-Your Creative Textile Partner"></h1>
    <p class="hero-tagline" id="tagline">
      From original print design to cutting-edge digital printing, we craft fabrics that tell stories.
      Our in-house garment segment transforms concepts into couture, blending art with apparel.
      At 4SPID, design isn't just a service — it's our signature.
    </p>
    <a href="home.html" class="explore-btn" id="exploreBtn">Explore</a>
  </section>

  <script>
    // ── 1. Start video loading immediately but don't block render ──
    const video = document.getElementById('bgVideo');

    // Kick off video load right away
    video.load();

    // Fade it in once enough data is ready
    video.addEventListener('canplay', function () {
      video.play().catch(() => {}); // catch autoplay policy errors silently
      video.classList.add('loaded');
    });

    // ── 2. Typing effect — starts immediately on DOMContentLoaded ──
    const introText = "Design. Print. Deliver — Your Creative Textile Partner";
    const titleEl   = document.getElementById('intro');
    const taglineEl = document.getElementById('tagline');
    const btnEl     = document.getElementById('exploreBtn');

    let charIndex = 0;
    const speed = 50; // slightly faster than original 60ms

    function typeWriter() {
      if (charIndex < introText.length) {
        titleEl.textContent += introText.charAt(charIndex);
        charIndex++;
        setTimeout(typeWriter, speed);
      } else {
        // Typing done: hide cursor, reveal tagline + button
        titleEl.classList.add('done');
        taglineEl.classList.add('visible');
        btnEl.classList.add('visible');
      }
    }

    // Start typing as soon as DOM is ready — no waiting for window.onload
    document.addEventListener('DOMContentLoaded', typeWriter);
  </script>

</body>
</html>
